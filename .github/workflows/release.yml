name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: code-ratchet-darwin-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: code-ratchet-darwin-x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: code-ratchet-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset: code-ratchet-linux-arm64
            cross: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: code-ratchet-windows-x86_64.exe
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux arm64 only)
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build (cargo)
        if: ${{ !matrix.cross }}
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          src="target/${{ matrix.target }}/release/code-ratchet"
          [ "${{ runner.os }}" = "Windows" ] && src="${src}.exe"
          cp "$src" "${{ matrix.asset }}"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
          fail_on_unmatched_files: true

  crates-io:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish --locked --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true   # don't fail the release if crates.io is flaky
