# code-ratchet config
# Quality only goes up. Edit each layer's `command` to suit your project.
# Empty `command` disables the layer. Set `required: false` to make a layer
# advisory (failure won't block the commit, but metrics still feed the baseline).

language: python

l0:
  command: ruff check .
  required: true

l1:
  command: mypy .
  required: false

l2:
  command: pytest --cov=. --cov-report=term-missing -q
  required: true
